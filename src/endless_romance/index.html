<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>{{title}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <style>
    :root {
      /* 注入用户配置的颜色 */
      --primary: {{color_primary}};
      --accent: {{color_accent}};
      --bg-image: url("{{bg_image_url}}");
      
      /* 固定 UI 常量 */
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.25);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.7);
      --radius-premium: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
      color: var(--text-main);
      background-color: #0b1020;
      background-image: linear-gradient(135deg, #0b1020 0%, #1a1a2e 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 全屏背景图层 */
    .ms-bg-wrap {
      position: fixed; inset: 0; z-index: -1;
      background-image: var(--bg-image);
      background-size: cover;
      background-position: center;
      opacity: 0.4;
      filter: saturate(1.2) blur(2px);
    }
    .ms-bg-overlay {
      position: fixed; inset: 0; z-index: -1;
      background: radial-gradient(circle at top left, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
    }

    .app-container {
      max-width: 600px; margin: 0 auto;
      padding: 30px 20px 80px;
      display: flex; flex-direction: column; gap: 24px;
    }

    /* 顶部导航 */
    header { display: flex; justify-content: space-between; align-items: center; }
    .logo-box { display: flex; align-items: center; gap: 10px; }
    .logo-circle {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(45deg, var(--primary), var(--accent));
      box-shadow: 0 0 15px var(--primary);
    }
    .badge {
      background: var(--glass-bg); padding: 5px 12px;
      border-radius: 20px; border: 1px solid var(--glass-border);
      font-size: 11px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    /* 核心卡片样式 */
    .premium-card {
      background: var(--glass-bg);
      backdrop-filter: blur(25px) saturate(1.5);
      -webkit-backdrop-filter: blur(25px) saturate(1.5);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-premium);
      padding: 24px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      animation: fadeInUp 0.8s ease-out;
    }

    .hero-title { font-size: 28px; line-height: 1.2; margin-bottom: 12px; font-weight: 700; }
    .hero-title span { background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; color: transparent; }
    
    .subtitle { font-size: 14px; color: var(--text-sub); margin-bottom: 24px; line-height: 1.6; }

    /* 交互按钮 */
    .main-btn {
      background: linear-gradient(to right, var(--primary), var(--accent));
      color: #000; border: none; width: 100%; padding: 16px;
      border-radius: 16px; font-weight: 600; font-size: 15px;
      cursor: pointer; transition: transform 0.2s;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }
    .main-btn:active { transform: scale(0.97); }

    /* 故事区 */
    .story-content {
      font-size: 15px; line-height: 1.8; color: rgba(255,255,255,0.9);
      white-space: pre-line;
    }

    /* 详细列表 */
    .meta-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .meta-item { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }
    .meta-label { font-size: 12px; color: var(--text-sub); text-transform: uppercase; }
    .meta-value { font-size: 13px; font-weight: 500; }

    /* 相册滚动 */
    .gallery-container {
      margin-top: 10px; overflow-x: auto;
      display: flex; gap: 12px; padding-bottom: 10px;
      scrollbar-width: none;
    }
    .gallery-container::-webkit-scrollbar { display: none; }
    .gallery-img {
      flex: 0 0 120px; height: 160px; border-radius: 16px;
      object-fit: cover; border: 1px solid var(--glass-border);
    }

    footer { text-align: center; font-size: 10px; color: var(--text-sub); letter-spacing: 2px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="ms-bg-wrap"></div>
  <div class="ms-bg-overlay"></div>

  <div class="app-container">
    <header>
      <div class="logo-box">
        <div class="logo-circle"></div>
        <div style="font-weight: 600; font-size: 14px; letter-spacing: 1px;">ROMANCE SPACE</div>
      </div>
      <div class="badge">EST. {{date}}</div>
    </header>

    <main class="premium-card">
      <h1 class="hero-title">{{title}}<br><span>{{couple_names}}</span></h1>
      <p class="subtitle">{{subtitle}}</p>
      
      <div class="meta-list">
        <div class="meta-item">
          <span class="meta-label">Location</span>
          <span class="meta-value">{{location}}</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Moment</span>
          <span class="meta-value">{{date}}</span>
        </div>
      </div>

      <div style="margin-top: 24px;">
        <button class="main-btn" onclick="document.getElementById('story-sec').scrollIntoView({behavior:'smooth'})">
          {{button_text}}
        </button>
      </div>
    </main>

    <section class="premium-card" id="story-sec">
      <div style="font-size: 11px; color: var(--primary); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Our Story</div>
      <div class="story-content">{{story}}</div>
    </section>

    <section class="premium-card">
      <div style="font-size: 11px; color: var(--primary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px;">Memory Gallery</div>
      <div class="gallery-container" id="ms-gallery">
        </div>
      <div style="font-size: 9px; color: var(--text-sub); text-align: center; margin-top: 10px;">← 左右滑动浏览回忆 →</div>
    </section>

    <footer>
      &copy; ROMANCE SPACE · 打造极致浪漫单页
    </footer>
  </div>

  <script>
    // 处理图库图片列表变量
    (function initGallery() {
      const container = document.getElementById('ms-gallery');
      const rawUrls = `{{gallery_images}}`;
      
      // 按照换行或逗号分割，过滤空行
      const urls = rawUrls.split(/[\n,]/).map(url => url.trim()).filter(url => url.length > 5);
      
      if (urls.length === 0) {
        container.parentElement.style.display = 'none';
        return;
      }

      urls.forEach(url => {
        const img = document.createElement('img');
        img.src = url;
        img.className = 'gallery-img';
        img.loading = 'lazy';
        container.appendChild(img);
      });
    })();
  </script>
</body>
</html>
