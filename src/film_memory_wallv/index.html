<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{{ main_title }}</title>
    <style>
        :root {
            --ms-primary: {{color_primary}};
            --ms-bg: {{color_bg}};
            --cream-yellow: #fdf5e6;
            --glass-white: rgba(255, 255, 255, 0.1);
            --film-shadow: 0 15px 45px rgba(0,0,0,0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at center, #2c1e16 0%, var(--ms-bg) 100%);
            background-attachment: fixed;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
            color: var(--cream-yellow);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 复古纸张纹理 */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/p6.png');
            opacity: 0.15; pointer-events: none; z-index: 1;
        }

        .container { position: relative; z-index: 2; max-width: 800px; margin: 0 auto; padding: 60px 20px; text-align: center; }

        header { margin-bottom: 60px; animation: fadeIn 1s ease; }
        h1 { font-size: 2.2rem; letter-spacing: 4px; color: var(--ms-primary); text-shadow: 1px 1px 0px var(--cream-yellow); margin-bottom: 12px; }
        .subtitle { font-size: 0.9rem; opacity: 0.7; font-weight: 300; letter-spacing: 1px; }

        /* 胶片网格 */
        .film-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 60px; }

        .film-card {
            background: #fff; padding: 12px 12px 35px 12px;
            box-shadow: var(--film-shadow);
            transform: rotate(var(--r, 2deg));
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: zoom-in;
        }
        .film-card:nth-child(even) { --r: -2deg; }
        .film-card:hover { transform: scale(1.05) rotate(0deg); z-index: 10; }

        /* 胶片孔位 */
        .film-card::before {
            content: "············"; position: absolute; top: 0; left: 0; width: 100%;
            background: #111; color: #eee; font-size: 12px; letter-spacing: 8px; text-align: center; line-height: 12px;
        }

        .photo-box { width: 100%; aspect-ratio: 1; background: #000; overflow: hidden; border: 1px solid #222; }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; filter: sepia(30%) contrast(1.1); }

        .card-meta { margin-top: 10px; color: #333; font-size: 0.75rem; text-align: left; font-family: monospace; font-weight: bold; }

        /* 弹窗系统 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: none; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s;
        }
        .modal.active { display: flex; opacity: 1; }

        .modal-bg {
            position: absolute; width: 100%; height: 100%;
            background-size: cover; background-position: center;
            filter: blur(20px) brightness(0.4) contrast(0.8);
            transform: scale(1.1);
        }

        .modal-content {
            position: relative; z-index: 101; width: 85%; max-width: 500px;
            text-align: center; animation: modalPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-img { width: 100%; border: 4px solid #fff; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin-bottom: 25px; }
        .modal-text { font-size: 1.1rem; line-height: 1.8; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .close-btn { margin-top: 30px; font-size: 0.8rem; letter-spacing: 2px; opacity: 0.6; text-decoration: underline; cursor: pointer; }

        /* 底部文案区 */
        .story-wall {
            background: var(--glass-white); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 40px 25px; border-radius: 2px; border-left: 3px solid var(--ms-primary);
            text-align: left; margin-top: 40px;
        }
        .story-wall p { white-space: pre-line; font-size: 1rem; opacity: 0.9; }

        @keyframes modalPop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .film-grid { grid-template-columns: 1fr; gap: 40px; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>{{ main_title }}</h1>
        <p class="subtitle">{{ subtitle }}</p>
    </header>

    <div class="film-grid">
        <div class="film-card" onclick="openModal('{{ img_1 }}', '{{ cap_1 }}')">
            <div class="photo-box">
                <img src="{{ img_1 }}" alt="film1">
            </div>
            <div class="card-meta">DATE: {{ memory_date_1 }}</div>
        </div>

        <div class="film-card" onclick="openModal('{{ img_2 }}', '{{ cap_2 }}')">
            <div class="photo-box">
                <img src="{{ img_2 }}" alt="film2">
            </div>
            <div class="card-meta">DATE: {{ memory_date_2 }}</div>
        </div>
    </div>

    <div class="story-wall">
        <p>{{ story_text }}</p>
    </div>

    <footer style="margin-top: 60px; font-size: 0.7rem; opacity: 0.3; letter-spacing: 2px;">
        DESIGNED FOR MOOD SPACE
    </footer>
</div>

<div id="photoModal" class="modal" onclick="closeModal()">
    <div id="modalBg" class="modal-bg"></div>
    <div class="modal-content">
        <img id="modalImg" class="modal-img" src="" alt="Zoomed">
        <div id="modalText" class="modal-text"></div>
        <div class="close-btn">点击任意处关闭</div>
    </div>
</div>

<script>
    function openModal(imgUrl, text) {
        const modal = document.getElementById('photoModal');
        const modalImg = document.getElementById('modalImg');
        const modalBg = document.getElementById('modalBg');
        const modalText = document.getElementById('modalText');

        modalImg.src = imgUrl;
        modalBg.style.backgroundImage = `url('${imgUrl}')`;
        modalText.innerText = text;
        
        modal.classList.add('active');
        document.body.style.overflow = 'hidden'; // 禁止滚动
    }

    function closeModal() {
        const modal = document.getElementById('photoModal');
        modal.style.opacity = '0';
        setTimeout(() => {
            modal.classList.remove('active');
            modal.style.opacity = '1';
            document.body.style.overflow = ''; 
        }, 400);
    }
</script>

</body>
</html>
