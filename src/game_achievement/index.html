<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVE RPG ADVANCED</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-green: #4ade80;
            --pixel-orange: #fb923c;
            --pixel-black: #1a1a1a;
            --pixel-white: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

        body {
            background-color: #2d5a27;
            background-image: repeating-conic-gradient(#356a2e 0% 25%, #2d5a27 0% 50%) 50% / 40px 40px;
            font-family: 'ZCOOL KuaiLe', cursive;
            display: flex; justify-content: center; min-height: 100vh; padding: 20px;
            overflow-x: hidden;
        }

        .game-ui {
            width: 100%; max-width: 500px;
            background: var(--pixel-white);
            border: 4px solid var(--pixel-black);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
            position: relative; display: flex; flex-direction: column;
            z-index: 10;
        }

        /* 状态栏 */
        .status-bar {
            background: var(--pixel-black); color: white; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .hp-fill { width: 90%; height: 16px; background: var(--pixel-green); border: 2px solid #fff; }

        /* 天数 */
        .days-bar { padding: 10px 20px; font-size: 0.8rem; border-bottom: 2px solid #ddd; }

        /* 成就网格 */
        .achievement-grid {
            padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; flex-grow: 1;
        }

        .ac-card {
            border: 3px solid var(--pixel-black); padding: 15px; text-align: center;
            background: #eee; cursor: pointer; transition: 0.1s; position: relative;
        }

        .ac-card:hover { transform: translateY(-4px); background: #fff; box-shadow: 0 4px 0 var(--pixel-black); }

        .ac-icon { font-size: 2.5rem; margin-bottom: 10px; }

        /* 系统消息框 */
        .sys-msg-box {
            margin: 0 20px 20px; padding: 15px;
            border: 2px solid #000; background: #fff;
            font-size: 0.8rem;
            position: relative;
        }

        .sys-msg-box::after { content: "▼"; position: absolute; bottom: 5px; right: 10px; opacity: 0.5; animation: blink 1s infinite; }

        /* 底部主按钮 (原按钮样式回退) */
        .pixel-btn-container {
            padding: 0 20px 20px;
        }

        .main-pixel-btn {
            width: 100%; padding: 15px;
            background: var(--pixel-orange);
            border: 4px solid var(--pixel-black);
            box-shadow: 0 5px 0 #c2410c;
            color: white; font-size: 1.2rem;
            cursor: pointer; text-shadow: 2px 2px var(--pixel-black);
            font-family: inherit;
        }

        .main-pixel-btn:active { transform: translateY(5px); box-shadow: none; }

        /* 弹窗样式 */
        .pixel-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--pixel-white); border: 4px solid var(--pixel-black);
            width: 100%; max-width: 400px; padding: 20px; position: relative;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-title { font-size: 1.3rem; color: var(--pixel-orange); margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px; text-align: center;}

        .modal-image-container { width: 100%; aspect-ratio: 4/3; background: #eee; border: 2px solid #000; margin-bottom: 15px; overflow: hidden; }

        .modal-image { width: 100%; height: 100%; object-fit: cover; }

        .modal-body { font-size: 0.9rem; line-height: 1.6; color: #333; margin-bottom: 20px; text-align: left;}

        .close-btn { 
            width: 100%; padding: 10px; background: var(--pixel-black); color: white; 
            border: none; cursor: pointer; font-family: inherit; font-size: 1rem;
        }

        /* 粒子和超级特效 */
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        @keyframes heartFly {
            from { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            to { transform: translate(-50%, -150vh) scale(3) rotate(360deg); opacity: 0; }
        }

        .particle { position: absolute; width: 10px; height: 10px; pointer-events: none; z-index: 200; }
        .super-heart { position: fixed; top: 50%; left: 50%; color: var(--pixel-orange); font-size: 5rem; z-index: 1000; animation: heartFly 2.5s ease-out forwards; pointer-events: none;}

    </style>
</head>
<body>

    <div class="game-ui">
        <div class="status-bar">
            <div style="font-size: 0.8rem;">PLAYER: {{ player_name }}<br>LEVEL: {{ love_level }}</div>
            <div style="width: 100px;"><div style="font-size: 0.6rem; text-align: right;">LOVE HP</div><div class="hp-fill"></div></div>
        </div>

        <div class="days-bar">ACTIVE: {{ love_days }}</div>

        <div class="achievement-grid">
            <div class="ac-card" onclick="openModal('{{ ac_1_title }}', '{{ ac_1_msg }}', '{{ ac_1_img }}')">
                <div class="ac-icon">{{ ac_1_icon }}</div>
                <div style="font-size: 0.9rem;">{{ ac_1_title }}</div>
            </div>
            <div class="ac-card" onclick="openModal('{{ ac_2_title }}', '{{ ac_2_msg }}', '{{ ac_2_img }}')">
                <div class="ac-icon">{{ ac_2_icon }}</div>
                <div style="font-size: 0.9rem;">{{ ac_2_title }}</div>
            </div>
            <div class="ac-card" onclick="openModal('{{ ac_3_title }}', '{{ ac_3_msg }}', '{{ ac_3_img }}')">
                <div class="ac-icon">{{ ac_3_icon }}</div>
                <div style="font-size: 0.9rem;">{{ ac_3_title }}</div>
            </div>
            <div class="ac-card" onclick="openModal('{{ ac_4_title }}', '{{ ac_4_msg }}', '{{ ac_4_img }}')">
                <div class="ac-icon">{{ ac_4_icon }}</div>
                <div style="font-size: 0.9rem;">{{ ac_4_title }}</div>
            </div>
        </div>

        <div class="sys-msg-box">
            <p>{{ system_msg }}</p>
        </div>

        <div class="pixel-btn-container">
            <button class="main-pixel-btn" onclick="startSuperEffect()">{{ main_btn_text }}</button>
        </div>
    </div>

    <div id="pixelModal" class="pixel-modal" onclick="closeModalOnBg(event)">
        <div class="modal-content">
            <div id="mTitle" class="modal-title">成就达成</div>
            <div class="modal-image-container">
                <img id="mImg" class="modal-image" src="" alt="Memory Image">
            </div>
            <div id="mBody" class="modal-body">情话加载中...</div>
            <button class="close-btn" onclick="closeModal()">返回游戏</button>
        </div>
    </div>

    <script>
        function openModal(title, msg, imgUrl) {
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mBody').innerText = msg;
            // 处理默认图片：如果没填，显示占位符
            const finalImg = imgUrl && imgUrl.startsWith('http') ? imgUrl : 'https://via.placeholder.com/400x300.png?text=Pixel+Memory';
            document.getElementById('mImg').src = finalImg;
            document.getElementById('pixelModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('pixelModal').style.display = 'none';
        }

        function closeModalOnBg(e) {
            if(e.target.className === 'pixel-modal') closeModal();
        }

        // 超级全屏心形效果
        function startSuperEffect() {
            // 生成超大心形
            const heart = document.createElement('div');
            heart.className = 'super-heart';
            heart.innerText = '❤️';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2500);

            // 同时在屏幕四角产生像素爆炸
            for(let i=0; i<4; i++) {
                createExplosion(
                    [10, window.innerWidth-10, window.innerWidth-10, 10][i],
                    [10, 10, window.innerHeight-10, window.innerHeight-10][i]
                );
            }
            // 手机震动
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);
        }

        function createExplosion(x, y) {
            for(let i=0; i<20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.backgroundColor = ['#fb923c', '#4ade80', '#ff0'][Math.floor(Math.random()*3)];
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 100 + 30;
                p.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
                ], { duration: 800 }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
