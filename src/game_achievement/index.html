<div class="achievement-grid">
    <div class="ac-card" onclick="openModal('{{ ac_1_title }}', '{{ ac_1_msg }}', '{{ ac_1_img }}')">
        <div class="ac-icon">{{ ac_1_icon }}</div>
        <div style="font-size: 0.9rem;">{{ ac_1_title }}</div>
    </div>
    </div>

<script>
    function openModal(title, msg, imgUrl) {
        document.getElementById('mTitle').innerText = title;
        document.getElementById('mBody').innerText = msg;
        
        // 关键：建造机会将 {{ac_x_img}} 替换为绝对路径。
        // 我们只需处理“未上传”时的兜底图片逻辑。
        const mImg = document.getElementById('mImg');
        
        if (imgUrl && imgUrl !== '' && imgUrl !== 'placeholder.png') {
            mImg.src = imgUrl;
            mImg.style.display = 'block';
        } else {
            // 如果用户没传图，可以展示一个统一的像素占位图或直接隐藏
            mImg.src = 'https://via.placeholder.com/400x300.png?text=Pixel+Memory';
        }
        
        document.getElementById('pixelModal').style.display = 'flex';
    }
</script>
