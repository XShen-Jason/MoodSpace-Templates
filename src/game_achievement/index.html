<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LOVE RPG SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-green: #4ade80;
            --pixel-orange: #fb923c;
            --pixel-black: #1a1a1a;
            --pixel-white: #f5f5f5;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }

        body {
            background-color: #2d5a27;
            background-image: repeating-conic-gradient(#356a2e 0% 25%, #2d5a27 0% 50%) 50% / 40px 40px;
            font-family: 'ZCOOL KuaiLe', cursive;
            display: flex; justify-content: center; min-height: 100vh; padding: 20px;
        }

        .game-ui {
            width: 100%; max-width: 500px;
            background: var(--pixel-white);
            border: 4px solid var(--pixel-black);
            box-shadow: 8px 8px 0 rgba(0,0,0,0.2);
            position: relative; display: flex; flex-direction: column;
        }

        /* 状态栏 */
        .status-bar {
            background: var(--pixel-black); color: white; padding: 15px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .hp-fill { width: 90%; height: 16px; background: var(--pixel-green); border: 2px solid #fff; }

        /* 成就网格 */
        .achievement-grid {
            padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .ac-card {
            border: 3px solid var(--pixel-black); padding: 15px; text-align: center;
            background: #eee; cursor: pointer; transition: 0.1s;
        }

        .ac-card:hover { transform: translateY(-4px); background: #fff; box-shadow: 0 4px 0 var(--pixel-black); }

        .ac-icon { font-size: 2.5rem; margin-bottom: 10px; }

        /* 隐藏的像素弹窗 */
        .pixel-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--pixel-white); border: 4px solid var(--pixel-black);
            width: 100%; max-width: 400px; padding: 20px; position: relative;
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-title { font-size: 1.5rem; color: var(--pixel-orange); margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 5px; }

        .modal-body { font-size: 1rem; line-height: 1.6; color: #333; margin-bottom: 20px; }

        .close-btn { 
            width: 100%; padding: 10px; background: var(--pixel-black); color: white; 
            border: none; cursor: pointer; font-family: inherit;
        }

        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

        .particle { position: absolute; width: 8px; height: 8px; pointer-events: none; z-index: 200; }
    </style>
</head>
<body>

    <div class="game-ui">
        <div class="status-bar">
            <div style="font-size: 0.8rem;">PLAYER: {{ player_name }}<br>LEVEL: {{ love_level }}</div>
            <div style="width: 100px;"><div style="font-size: 0.6rem; text-align: right;">LOVE HP</div><div class="hp-fill"></div></div>
        </div>

        <div style="padding: 10px 20px; font-size: 0.8rem;">ACTIVE: {{ love_days }}</div>

        <div class="achievement-grid">
            <div class="ac-card" onclick="openModal('{{ ac_1_title }}', '{{ ac_1_msg }}', event)">
                <div class="ac-icon">{{ ac_1_icon }}</div>
                <div style="font-size: 0.9rem;">{{ ac_1_title }}</div>
            </div>
            <div class="ac-card" onclick="openModal('{{ ac_2_title }}', '{{ ac_2_msg }}', event)">
                <div class="ac-icon">{{ ac_2_icon }}</div>
                <div style="font-size: 0.9rem;">{{ ac_2_title }}</div>
            </div>
            <div class="ac-card" onclick="openModal('{{ ac_3_title }}', '{{ ac_3_msg }}', event)">
                <div class="ac-icon">{{ ac_3_icon }}</div>
                <div style="font-size: 0.9rem;">{{ ac_3_title }}</div>
            </div>
            <div class="ac-card" onclick="openModal('{{ ac_4_title }}', '{{ ac_4_msg }}', event)">
                <div class="ac-icon">{{ ac_4_icon }}</div>
                <div style="font-size: 0.9rem;">{{ ac_4_title }}</div>
            </div>
        </div>

        <div style="margin: 20px; padding: 15px; border: 2px solid #000; background: #fff; font-size: 0.8rem;">
            > 系统消息：点击上方成就方格，查看隐藏的回忆细节。
        </div>
    </div>

    <div id="pixelModal" class="pixel-modal">
        <div class="modal-content">
            <div id="mTitle" class="modal-title">成就达成</div>
            <div id="mBody" class="modal-body">内容加载中...</div>
            <button class="close-btn" onclick="closeModal()">返回游戏</button>
        </div>
    </div>

    <script>
        function openModal(title, msg, e) {
            document.getElementById('mTitle').innerText = title;
            document.getElementById('mBody').innerText = msg;
            document.getElementById('pixelModal').style.display = 'flex';
            createExplosion(e.clientX, e.clientY);
        }

        function closeModal() {
            document.getElementById('pixelModal').style.display = 'none';
        }

        function createExplosion(x, y) {
            for(let i=0; i<15; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.backgroundColor = ['#fb923c', '#4ade80', '#fff'][Math.floor(Math.random()*3)];
                document.body.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 80 + 20;
                p.animate([
                    { transform: 'translate(0,0)', opacity: 1 },
                    { transform: `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`, opacity: 0 }
                ], { duration: 500 }).onfinish = () => p.remove();
            }
        }
    </script>
</body>
</html>
