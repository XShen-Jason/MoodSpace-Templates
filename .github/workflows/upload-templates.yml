name: Upload Changed Templates

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  upload:
    name: Detect & Upload Changed Templates
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit to diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Detect changed template directories
        id: changed
        run: |
          # Get all template names that had any file change in src/
          # This includes Added (A), Modified (M), Renamed (R), and Deleted (D)
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- src/ | grep '^src/' | cut -d'/' -f2 | sort -u || true)
          echo "Templates with changes: $CHANGED"
          
          # Convert to comma-separated for GH output
          TEMPLATES=$(echo "$CHANGED" | tr '\n' ',' | sed 's/,$//' || true)
          echo "templates=$TEMPLATES" >> "$GITHUB_OUTPUT"

      - name: Process each changed template (Upload or Delete)
        if: steps.changed.outputs.templates != ''
        env:
          RS_ADMIN_KEY: ${{ secrets.RS_ADMIN_KEY }}
          RS_WORKER_URL: ${{ vars.RS_WORKER_URL || secrets.RS_WORKER_URL || 'https://api.moodspace.xyz' }}
        run: |
          IFS=',' read -ra TMPL_LIST <<< "${{ steps.changed.outputs.templates }}"
          for tmpl in "${TMPL_LIST[@]}"; do
            tmpl=$(echo "$tmpl" | xargs)   # remove accidental whitespace
            DIR="src/$tmpl"
            
            if [ -d "$DIR" ] && [ -f "$DIR/index.html" ]; then
              echo "⬆️  Uploading template: $tmpl"
              node -r dotenv/config scripts/upload-template.js "$tmpl" "$DIR"
            elif [ ! -d "$DIR" ]; then
              echo "🗑️  Template directory missing. Requesting deletion: $tmpl"
              node -r dotenv/config scripts/delete-template.js "$tmpl"
            else
              echo "⚠️  Skipping '$tmpl': does not look like a valid template (missing index.html or not a dir)"
            fi
          done
